            eventData[currentIndex].rules.forEach((rule) => {

                li.textContent = rule;
                modalRules.appendChild(li);
            });
        }

        function animateChange(direction) {
            const body = document.querySelector(".modal-body");

            body.classList.remove("slide-in");
            body.classList.add(
                direction === "next" ? "slide-out-left" : "slide-out-right",
            );

            setTimeout(() => {
                showContent();

                body.classList.remove("slide-out-left", "slide-out-right");
                body.classList.add("slide-in");
            }, 200);

    <!-- CUSTOM CURSOR -->
    <script>
        const dot = document.querySelector(".cursor-dot");
        const ring = document.querySelector(".cursor-ring");

        let mouseX = 0;
        let mouseY = 0;

        let ringX = 0;
        let ringY = 0;

        // track mouse
        document.addEventListener("mousemove", (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            dot.style.left = mouseX + "px";
            dot.style.top = mouseY + "px";
        });

        // smooth follow (lag effect)
        function animate() {
            ringX += (mouseX - ringX) * 0.15;
            ringY += (mouseY - ringY) * 0.15;

            ring.style.left = ringX + "px";
            ring.style.top = ringY + "px";

            requestAnimationFrame(animate);
        }

        animate();

        // hover detection
        const hoverElements = document.querySelectorAll("button, img, .item");

        hoverElements.forEach((el) => {
            el.addEventListener("mouseenter", () => {
                document.body.classList.add("cursor-hover");
            });

            el.addEventListener("mouseleave", () => {
                document.body.classList.remove("cursor-hover");
            });
        });

        //OPTIONAL

        document.addEventListener("click", () => {
            ring.style.transform = "translate(-50%, -50%) scale(0.7)";
            setTimeout(() => {
                ring.style.transform = "translate(-50%, -50%) scale(1)";
            }, 100);
        });
    </script>
