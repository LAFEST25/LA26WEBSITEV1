        // scene.fog = new THREE.Fog(0x050514, 150, 2500);
        // scene.fog = new THREE.Fog(0x050514, 80, 700);
        scene.fog = new THREE.Fog(
            0x050514,   // fog color (same as your background)
            400,        // start fading at this distance
            700        // fully fogged at this distance
        );

        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x444444));

        light.position.set(10, 10, 10);
        scene.add(light);

        const starGeo = new THREE.BufferGeometry();
        const starCount = 22000;

        /* 🔥 FIX: bigger universe so camera never exits star volume */
        for (let i = 0; i < starCount; i++) {

                (Math.random() - 0.5) * 5000,

        }

            starGeo,

                size: 1,
                sizeAttenuation: true

        /* ---------------- PATH (UNCHANGED) ---------------- */
        function path(i) {

            const blockSize = 5;
            const block = Math.floor(i / blockSize);
            const local = i % blockSize;

            const spacing = 75;
            const z = -i * spacing;

            const t = local / blockSize * Math.PI * 2;

            let x = 0, y = 0;

            if (block === 0) {
                x = Math.cos(t) * 18;
                y = Math.sin(t) * 10;
            }

            if (block === 1) {
                x = 25 + Math.cos(t) * 22;
                y = local * 6;
            }

            if (block === 2) {
                x = -28 + Math.sin(t) * 20;
                y = -local * 5;
            }

            if (block === 3) {
                x = local * 10;
                y = Math.sin(t) * 18;
            }

            if (block >= 4) {
                x = Math.cos(t) * 30;
                y = Math.sin(t) * 22;
            }

            return new THREE.Vector3(x, y, z);
        }

        /* ---------------- LOGOS (UNCHANGED) ---------------- */
        const nodes = [];
        const loader = new THREE.TextureLoader();

        function fallback(n) {
            const c = document.createElement("canvas");
            c.width = 512; c.height = 512;
            const ctx = c.getContext("2d");

            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, 512, 512);

            ctx.strokeStyle = "#d4af37";
            ctx.lineWidth = 10;
            ctx.strokeRect(10, 10, 492, 492);

            ctx.fillStyle = "#000";
            ctx.font = "bold 90px Arial";
            ctx.textAlign = "center";
            ctx.fillText(n, 256, 260);

            return new THREE.CanvasTexture(c);
        }

        function make(item, i) {

            const geo = new THREE.PlaneGeometry(14, 14);
            const mesh = new THREE.Mesh(geo);

            mesh.userData = { index: item.index };

            const imgIndex = item.index;

            loader.load(
                `logo/${imgIndex}.png`,
                (tex) => {
                    tex.colorSpace = THREE.SRGBColorSpace;

                    mesh.material = new THREE.MeshBasicMaterial({
                        map: tex,
                        transparent: true
                    });
                },
                undefined,
                () => {
                    mesh.material = new THREE.MeshBasicMaterial({
                        map: fallback(imgIndex),
                        transparent: true
                    });
                }
            );

            scene.add(mesh);
            nodes.push(mesh);
        }

        items.forEach((it, i) => make(it, i));

        /* ---------------- SCROLL ---------------- */
        let target = 0;
        let current = 0;

        // Auto‑scroll on load
        let autoScroll = true;
        let autoScrollProgress = 0;
        const autoScrollTotal = 1000;

        window.addEventListener("wheel", (e) => {
            userInteracted = true;
            target += e.deltaY * 0.0018;
            target = Math.max(0, Math.min(target, items.length - 1));
        });

        // ---------------- SCROLL (wheel + touch) ----------------
        let startY = 0;
        let isDragging = false;

        // TOUCH scroll
        window.addEventListener("touchstart", (e) => {
            if (e.touches.length !== 1) return;
            startY = e.touches[0].clientY;
            isDragging = true;
        });

        window.addEventListener("touchmove", (e) => {
            userInteracted = true;
            if (!isDragging) return;
            e.preventDefault(); // prevents page scroll, keeps control in 3D timeline

            const y = e.touches[0].clientY;
            const delta = startY - y;
            startY = y;

            target += delta * 0.022; // tune sensitivity
            target = Math.max(0, Math.min(target, items.length - 1));
        }, { passive: false });

        window.addEventListener("touchend", () => {
            isDragging = false;
        });

        /* ---------------- CAMERA ---------------- */
        let rotX = 0, rotY = 0;
        let tX = 0, tY = 0;

        window.addEventListener("mousemove", (e) => {
            tY = (e.clientX / innerWidth - 0.5) * 1.2;
            tX = (e.clientY / innerHeight - 0.5) * 0.8;
        });

        /* ---------------- CLICK ---------------- */
        const ray = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener("click", (e) => {

            mouse.x = (e.clientX / innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / innerHeight) * 2 + 1;

            ray.setFromCamera(mouse, camera);

            const hit = ray.intersectObjects(nodes, true);

            if (hit.length) {
                openModal(hit[0].object.userData.index);
            }
        });

        /* ---------------- MODAL ---------------- */
        function openModal(idx) {

            const data = yearData[idx] || {
                title: `LA Fest Entry ${idx}`,
                desc: `Archival festival memory for timeline slot ${idx}.`
            };

            document.getElementById("modal").style.display = "flex";
            setTimeout(() => document.getElementById("modal").style.opacity = 1, 10);

            // document.getElementById("mYear").innerText = ` LA FEST ${idx}`;
            document.getElementById("mTitle").innerText = data.title;
            document.getElementById("mDesc").innerText = data.desc;
        }

        function closeModal() {
            document.getElementById("modal").style.opacity = 0;
            setTimeout(() => document.getElementById("modal").style.display = "none", 300);
        }

        /* ---------------- ANIMATION (STAR FIX INCLUDED ONLY HERE) ---------------- */
        let userInteracted = false;
        function animate() {
            requestAnimationFrame(animate);

            // Auto‑scroll only if not stopped by user
            if (autoScroll && !userInteracted) {
                autoScrollProgress++;
                if (autoScrollProgress <= autoScrollTotal) {
                    // scroll from 0 to last index over `autoScrollTotal` frames
                    target = (items.length - 1) * (autoScrollProgress / autoScrollTotal);
                } else {
                    autoScroll = false;
                }
            }


            current += (target - current) * 0.05;

            const i = Math.floor(current);
            const f = current - i;

            const a = path(i);
            const b = path(i + 1);

            const pos = new THREE.Vector3().lerpVectors(a, b, f);

            /* 🔥 FIX: STARFIELD NOW FOLLOWS CAMERA PROPERLY */
            stars.position.copy(camera.position);
            stars.position.multiplyScalar(0.05);

            nodes.forEach((n, idx) => {
                const p = path(idx);
                n.position.copy(p);
                n.lookAt(camera.position);
            });

            rotX += (tX - rotX) * 0.05;
            rotY += (tY - rotY) * 0.05;

            camera.position.x = pos.x + Math.sin(rotY) * 10;
            camera.position.y = pos.y + Math.sin(rotX) * 8 + 12;
            camera.position.z = pos.z + 60 + Math.cos(rotY) * 10;

            camera.lookAt(pos.x, pos.y, pos.z);

            renderer.render(scene, camera);
        }

        animate();

        /* ---------------- RESIZE ---------------- */
        window.addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
